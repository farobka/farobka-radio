<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Farobka Radio Crossfade Test</title>
  <style>
    :root {
      --bg: #080403;
      --panel: rgba(255,255,255,.08);
      --panel2: rgba(255,255,255,.12);
      --text: #fff7ee;
      --muted: rgba(255,247,238,.62);
      --accent: #ff4f2e;
      --accent2: #f7b267;
      --good: #8cffc1;
      --bad: #ff7a7a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,79,46,.25), transparent 32%),
        radial-gradient(circle at 85% 25%, rgba(247,178,103,.18), transparent 28%),
        linear-gradient(135deg, #050202, #160b07 48%, #050202);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(980px, 100%);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.48);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
      backdrop-filter: blur(16px);
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 74px);
      letter-spacing: -0.06em;
      line-height: .92;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .now {
      margin-top: 34px;
      padding: 26px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.1);
    }

    .label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .title {
      font-size: clamp(28px, 5vw, 54px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    .artist {
      font-size: 22px;
      color: var(--accent2);
    }

    .meta {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 800;
      color: #160703;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(255,79,46,.22);
    }

    button.secondary {
      color: var(--text);
      background: var(--panel2);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,.12);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .volume {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
    }

    input[type="range"] {
      width: 160px;
    }

    .meters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .meter {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      font-size: 14px;
    }

    .meter strong {
      display: block;
      color: var(--text);
      margin-bottom: 8px;
    }

    .bar {
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .12s linear;
    }

    .history {
      margin-top: 20px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.08);
    }

    .history-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
    }

    .status {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.ok {
      color: var(--good);
    }

    .status.bad {
      color: var(--bad);
    }

    @media (max-width: 720px) {
      .app {
        padding: 18px;
      }

      .meters {
        grid-template-columns: 1fr;
      }

      .controls {
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      .volume {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <div>
        <h1>Farobka Radio</h1>
        <div class="badge">☕ Crossfade test · 5 seconds</div>
      </div>
      <div class="badge" id="trackCount">Загрузка плейлиста...</div>
    </div>

    <section class="now">
      <div class="label">Now Playing</div>
      <div class="title" id="title">Не играет</div>
      <div class="artist" id="artist">Нажми Play</div>
      <div class="meta" id="meta">Тестовая страница не меняет основной index.html.</div>

      <div class="controls">
        <button id="playBtn">▶ Play</button>
        <button id="nextBtn" class="secondary">⏭ Next</button>
        <button id="stopBtn" class="secondary">⏹ Stop</button>

        <label class="volume">
          Громкость
          <input id="volume" type="range" min="0" max="100" value="80" />
          <span id="volumeText">80%</span>
        </label>
      </div>

      <div class="meters">
        <div class="meter">
          <strong>Player A</strong>
          <div class="bar"><div class="fill" id="barA"></div></div>
          <div id="infoA">idle</div>
        </div>
        <div class="meter">
          <strong>Player B</strong>
          <div class="bar"><div class="fill" id="barB"></div></div>
          <div id="infoB">idle</div>
        </div>
      </div>

      <div id="status" class="status">Готовлю эфирный котёл...</div>
    </section>

    <section class="history">
      <div class="label">History</div>
      <ol class="history-list" id="history"></ol>
    </section>
  </main>

  <script>
    const CROSSFADE_SECONDS = 5;
    const TICK_MS = 120;
    const RECENT_LIMIT = 8;

    let playlist = [];
    let recentIndexes = [];
    let historyItems = [];
    let currentIndex = -1;
    let isPlaying = false;
    let isCrossfading = false;
    let activeSlot = 0;
    let tickTimer = null;

    const audioA = new Audio();
    const audioB = new Audio();
    const players = [audioA, audioB];

    audioA.preload = "auto";
    audioB.preload = "auto";

    const el = {
      title: document.getElementById("title"),
      artist: document.getElementById("artist"),
      meta: document.getElementById("meta"),
      playBtn: document.getElementById("playBtn"),
      nextBtn: document.getElementById("nextBtn"),
      stopBtn: document.getElementById("stopBtn"),
      volume: document.getElementById("volume"),
      volumeText: document.getElementById("volumeText"),
      status: document.getElementById("status"),
      trackCount: document.getElementById("trackCount"),
      history: document.getElementById("history"),
      barA: document.getElementById("barA"),
      barB: document.getElementById("barB"),
      infoA: document.getElementById("infoA"),
      infoB: document.getElementById("infoB"),
    };

    function setStatus(text, type = "") {
      el.status.textContent = text;
      el.status.className = "status " + type;
    }

    function normalizePath(value) {
      let path = String(value || "").trim().replaceAll("\\\\", "/");

      if (!path) return "";

      if (path.startsWith("./")) {
        path = path.slice(2);
      }

      if (path.startsWith("radio_site/")) {
        path = path.slice("radio_site/".length);
      }

      if (path.startsWith("music_safe/")) {
        return path;
      }

      if (path.startsWith("http://") || path.startsWith("https://")) {
        return path;
      }

      if (path.endsWith(".mp3")) {
        return "music_safe/" + path;
      }

      return path;
    }

    function getTrackUrl(track) {
      return normalizePath(track.file || track.src || track.url || track.safe_file || "");
    }

    function cleanTrack(raw) {
      return {
        title: raw.title || "Без названия",
        artist: raw.artist || "Unknown Artist",
        license: raw.license || "",
        source: raw.source || "",
        attribution: raw.attribution || "",
        mood: raw.mood || "all",
        url: getTrackUrl(raw),
      };
    }

    function isForbidden(track) {
      const text = [
        track.title,
        track.artist,
        track.license,
        track.source,
        track.attribution,
        track.url,
      ].join(" ").toLowerCase();

      return [
        "todo",
        "needs license",
        "needs fma",
        "winter",
        "зима",
        "track-004",
        "noncommercial",
        "nonderivatives",
        "all rights reserved",
      ].some(bad => text.includes(bad));
    }

    function flattenTracks(value, out = []) {
      if (Array.isArray(value)) {
        value.forEach(item => flattenTracks(item, out));
      } else if (value && typeof value === "object") {
        const keys = Object.keys(value);
        const looksLikeTrack =
          keys.includes("title") &&
          keys.includes("artist") &&
          ["file", "src", "url", "safe_file"].some(k => keys.includes(k));

        if (looksLikeTrack) {
          out.push(value);
        } else {
          Object.values(value).forEach(item => flattenTracks(item, out));
        }
      }

      return out;
    }

    function volumeValue() {
      return Number(el.volume.value) / 100;
    }

    function applyVolume() {
      const v = volumeValue();
      el.volumeText.textContent = Math.round(v * 100) + "%";

      if (!isCrossfading) {
        players[activeSlot].volume = v;
        players[1 - activeSlot].volume = 0;
      }
    }

    function pickNextIndex() {
      if (playlist.length === 0) return -1;
      if (playlist.length === 1) return 0;

      const currentArtist = currentIndex >= 0 ? playlist[currentIndex].artist : "";

      let candidates = playlist
        .map((track, index) => ({ track, index }))
        .filter(item => item.index !== currentIndex)
        .filter(item => !recentIndexes.includes(item.index));

      const differentArtist = candidates.filter(
        item => item.track.artist !== currentArtist
      );

      if (differentArtist.length > 0) {
        candidates = differentArtist;
      }

      if (candidates.length === 0) {
        candidates = playlist
          .map((track, index) => ({ track, index }))
          .filter(item => item.index !== currentIndex);
      }

      const selected = candidates[Math.floor(Math.random() * candidates.length)];
      return selected.index;
    }

    function pushHistory(track) {
      historyItems.unshift(`${track.artist} — ${track.title}`);
      historyItems = historyItems.slice(0, 10);

      el.history.innerHTML = "";
      historyItems.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        el.history.appendChild(li);
      });
    }

    function rememberIndex(index) {
      recentIndexes.unshift(index);
      recentIndexes = [...new Set(recentIndexes)].slice(0, RECENT_LIMIT);
    }

    function renderNow(track) {
      el.title.textContent = track.title;
      el.artist.textContent = track.artist;
      el.meta.textContent = [
        track.mood ? "Mood: " + track.mood : "",
        track.license ? "License: " + track.license : "",
      ].filter(Boolean).join(" · ");
    }

    async function startTrack(index, slot = activeSlot) {
      if (index < 0 || index >= playlist.length) return;

      const track = playlist[index];
      const player = players[slot];

      currentIndex = index;
      activeSlot = slot;

      player.src = track.url;
      player.currentTime = 0;
      player.volume = volumeValue();

      players[1 - slot].pause();
      players[1 - slot].volume = 0;

      renderNow(track);
      rememberIndex(index);
      pushHistory(track);

      await player.play();

      isPlaying = true;
      el.playBtn.textContent = "⏸ Pause";
      setStatus("Играет. Кроссфейд включится за 5 секунд до конца.", "ok");
    }

    async function play() {
      if (playlist.length === 0) return;

      const player = players[activeSlot];

      if (currentIndex === -1 || !player.src) {
        await startTrack(pickNextIndex(), activeSlot);
        return;
      }

      await player.play();
      isPlaying = true;
      el.playBtn.textContent = "⏸ Pause";
      setStatus("Продолжаю эфир.", "ok");
    }

    function pause() {
      players.forEach(player => player.pause());
      isPlaying = false;
      el.playBtn.textContent = "▶ Play";
      setStatus("Пауза.");
    }

    function stop() {
      players.forEach(player => {
        player.pause();
        player.currentTime = 0;
        player.volume = 0;
      });

      isPlaying = false;
      isCrossfading = false;
      currentIndex = -1;
      el.playBtn.textContent = "▶ Play";
      el.title.textContent = "Не играет";
      el.artist.textContent = "Нажми Play";
      el.meta.textContent = "Тестовая страница не меняет основной index.html.";
      setStatus("Остановлено.");
    }

    async function nextManual() {
      if (playlist.length === 0) return;
      await crossfadeToNext(true);
    }

    function fadeStep(fromPlayer, toPlayer, startTime, durationMs) {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(1, elapsed / durationMs);
      const v = volumeValue();

      fromPlayer.volume = Math.max(0, v * (1 - progress));
      toPlayer.volume = Math.min(v, v * progress);

      if (progress < 1 && isCrossfading) {
        requestAnimationFrame(() => fadeStep(fromPlayer, toPlayer, startTime, durationMs));
      } else {
        fromPlayer.pause();
        fromPlayer.currentTime = 0;
        fromPlayer.volume = 0;
        toPlayer.volume = v;
        isCrossfading = false;
        activeSlot = players.indexOf(toPlayer);
        setStatus("Кроссфейд завершён. Эфир летит мягко.", "ok");
      }
    }

    async function crossfadeToNext(manual = false) {
      if (isCrossfading || playlist.length === 0) return;

      const fromSlot = activeSlot;
      const toSlot = 1 - activeSlot;
      const fromPlayer = players[fromSlot];
      const toPlayer = players[toSlot];
      const nextIndex = pickNextIndex();

      if (nextIndex < 0) return;

      const nextTrack = playlist[nextIndex];

      isCrossfading = true;
      currentIndex = nextIndex;

      toPlayer.src = nextTrack.url;
      toPlayer.currentTime = 0;
      toPlayer.volume = 0;

      renderNow(nextTrack);
      rememberIndex(nextIndex);
      pushHistory(nextTrack);

      try {
        await toPlayer.play();
      } catch (e) {
        isCrossfading = false;
        setStatus("Ошибка запуска следующего трека: " + e.message, "bad");
        return;
      }

      isPlaying = true;
      el.playBtn.textContent = "⏸ Pause";

      setStatus(
        manual
          ? "Ручной Next: делаю плавный переход."
          : "Автокроссфейд: следующий трек уже входит в эфир.",
        "ok"
      );

      fadeStep(fromPlayer, toPlayer, Date.now(), CROSSFADE_SECONDS * 1000);
    }

    function updateMeters() {
      const a = audioA;
      const b = audioB;

      const percentA = a.duration ? (a.currentTime / a.duration) * 100 : 0;
      const percentB = b.duration ? (b.currentTime / b.duration) * 100 : 0;

      el.barA.style.width = Math.max(0, Math.min(100, percentA)) + "%";
      el.barB.style.width = Math.max(0, Math.min(100, percentB)) + "%";

      el.infoA.textContent = a.src ? `${a.paused ? "paused" : "playing"} · vol ${Math.round(a.volume * 100)}%` : "idle";
      el.infoB.textContent = b.src ? `${b.paused ? "paused" : "playing"} · vol ${Math.round(b.volume * 100)}%` : "idle";
    }

    function tick() {
      updateMeters();

      if (isPlaying && !isCrossfading) {
        const player = players[activeSlot];

        if (player.duration && Number.isFinite(player.duration)) {
          const left = player.duration - player.currentTime;

          if (left <= CROSSFADE_SECONDS && left > 0.3) {
            crossfadeToNext(false);
          }
        }
      }
    }

    async function loadPlaylist() {
      try {
        const response = await fetch("playlist.json?cache=" + Date.now());

        if (!response.ok) {
          throw new Error("playlist.json HTTP " + response.status);
        }

        const data = await response.json();
        const rawTracks = flattenTracks(data);

        playlist = rawTracks
          .map(cleanTrack)
          .filter(track => track.url)
          .filter(track => !isForbidden(track));

        el.trackCount.textContent = playlist.length + " треков в эфире";

        if (playlist.length === 0) {
          setStatus("В playlist.json нет безопасных треков для эфира.", "bad");
          el.playBtn.disabled = true;
          el.nextBtn.disabled = true;
          return;
        }

        setStatus("Плейлист загружен. Можно тестировать кроссфейд.", "ok");
      } catch (e) {
        setStatus("Ошибка загрузки playlist.json: " + e.message, "bad");
        el.playBtn.disabled = true;
        el.nextBtn.disabled = true;
      }
    }

    el.playBtn.addEventListener("click", async () => {
      if (isPlaying) {
        pause();
      } else {
        try {
          await play();
        } catch (e) {
          setStatus("Ошибка Play: " + e.message, "bad");
        }
      }
    });

    el.nextBtn.addEventListener("click", async () => {
      try {
        await nextManual();
      } catch (e) {
        setStatus("Ошибка Next: " + e.message, "bad");
      }
    });

    el.stopBtn.addEventListener("click", stop);

    el.volume.addEventListener("input", applyVolume);

    players.forEach(player => {
      player.addEventListener("ended", () => {
        if (isPlaying && !isCrossfading) {
          crossfadeToNext(false);
        }
      });

      player.addEventListener("error", () => {
        setStatus("Ошибка аудио. Жми Next.", "bad");
      });
    });

    applyVolume();
    loadPlaylist();
    tickTimer = setInterval(tick, TICK_MS);
  </script>
</body>
</html>
