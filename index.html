<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farobka Radio</title>

  <style>
    :root {
      --bg: #080706;
      --card: rgba(26, 18, 13, 0.82);
      --card-strong: rgba(42, 27, 18, 0.92);
      --gold: #f5c77a;
      --gold-soft: #ffdca3;
      --coffee: #8b5a35;
      --text: #fff7ea;
      --muted: rgba(255, 247, 234, 0.68);
      --danger: #ffb3a7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(245, 199, 122, 0.32), transparent 34%),
        radial-gradient(circle at 16% 20%, rgba(139, 90, 53, 0.45), transparent 32%),
        radial-gradient(circle at 84% 28%, rgba(180, 91, 48, 0.24), transparent 34%),
        linear-gradient(145deg, #050403, #130c08 52%, #060504);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 82%);
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 34px 18px 28px;
      position: relative;
      z-index: 1;
    }

    .brand {
      text-align: center;
      margin: 6px auto 26px;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(56px, 12vw, 142px);
      line-height: 0.86;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      font-weight: 950;
      color: var(--gold-soft);
      text-shadow:
        0 0 18px rgba(245, 199, 122, 0.34),
        0 0 46px rgba(245, 199, 122, 0.18),
        0 12px 0 rgba(0, 0, 0, 0.35);
    }

    .brand-subtitle {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(14px, 2vw, 18px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .stage {
      display: grid;
      place-items: center;
    }

    .radio {
      width: min(720px, 94vw);
      padding: 26px;
      border: 1px solid rgba(245, 199, 122, 0.22);
      border-radius: 34px;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.08), transparent 38%),
        var(--card);
      box-shadow:
        0 30px 110px rgba(0, 0, 0, 0.62),
        inset 0 1px 0 rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(16px);
    }

    .top-row {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 22px;
      align-items: center;
    }

    .disc-wrap {
      display: grid;
      place-items: center;
    }

    .disc {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #f5c77a 0 11%, #2a1b12 12% 18%, transparent 19%),
        repeating-radial-gradient(circle at center, #19110d 0 8px, #0b0806 9px 14px);
      border: 1px solid rgba(245, 199, 122, 0.24);
      box-shadow:
        inset 0 0 28px rgba(0,0,0,0.78),
        0 0 38px rgba(245, 199, 122, 0.13);
      animation: spin 12s linear infinite;
      animation-play-state: paused;
    }

    body.playing .disc {
      animation-play-state: running;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .info {
      min-width: 0;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(245, 199, 122, 0.12);
      color: var(--gold-soft);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 0 rgba(245, 199, 122, 0.5);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      70% {
        box-shadow: 0 0 0 10px rgba(245, 199, 122, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(245, 199, 122, 0);
      }
    }

    #now {
      margin: 18px 0 0;
      min-height: 84px;
    }

    .track-title {
      font-size: clamp(25px, 4vw, 42px);
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: -0.04em;
      overflow-wrap: anywhere;
    }

    .artist {
      margin-top: 10px;
      color: var(--muted);
      font-size: 17px;
      overflow-wrap: anywhere;
    }

    .player-zone {
      margin-top: 24px;
      padding: 18px;
      border-radius: 24px;
      background: var(--card-strong);
      border: 1px solid rgba(255,255,255,0.08);
    }

    audio {
      width: 100%;
      display: block;
      margin: 0 0 18px;
      filter: sepia(0.12) saturate(1.08);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      color: #17100a;
      background: var(--gold);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.11);
    }

    .small-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .panel {
      min-height: 72px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }

    .panel b {
      color: var(--gold-soft);
    }

    #status {
      white-space: pre-wrap;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: rgba(255, 247, 234, 0.42);
      font-size: 12px;
    }

    @media (max-width: 650px) {
      .top-row {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .disc {
        width: 128px;
        height: 128px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .small-panels {
        grid-template-columns: 1fr;
      }

      .radio {
        padding: 18px;
        border-radius: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="brand">
      <h1 class="brand-title">Farobka Radio</h1>
      <p class="brand-subtitle">coffee mood broadcast</p>
    </header>

    <main class="stage">
      <section class="radio">
        <div class="top-row">
          <div class="disc-wrap">
            <div class="disc" aria-hidden="true"></div>
          </div>

          <div class="info">
            <div class="label">
              <span class="pulse"></span>
              Live playlist
            </div>

            <div id="now">
              <div class="track-title">Нажми «Загрузить»</div>
              <div class="artist">и включай кофейный эфир</div>
            </div>
          </div>
        </div>

        <div class="player-zone">
          <audio id="player" controls preload="auto"></audio>

          <div class="buttons">
            <button onclick="loadRadio()">☕ Загрузить</button>
            <button onclick="playRadio()">▶ Включить</button>
            <button class="secondary" onclick="nextTrack()">⏭ Следующий</button>
          </div>

          <div class="small-panels">
            <div class="panel">
              <b>Лицензия</b><br>
              <span id="license">Пока не загружено</span>
            </div>

            <div class="panel">
              <b>Статус</b><br>
              <span id="status">Ожидание...</span>
            </div>
          </div>
        </div>

        <div class="footer">
          Farobka Radio · CC0 / CC BY music station
        </div>
      </section>
    </main>
  </div>

  <script>
    var tracks = [];
    var currentIndex = 0;
    var recent = [];

    var player = document.getElementById("player");
    var now = document.getElementById("now");
    var statusBox = document.getElementById("status");
    var licenseBox = document.getElementById("license");

    function status(text) {
      statusBox.textContent = text;
      console.log(text);
    }

    function randomIndex() {
      if (!tracks.length) return 0;
      if (tracks.length === 1) return 0;

      var index = currentIndex;
      var attempts = 0;

      while ((index === currentIndex || recent.indexOf(index) !== -1) && attempts < 60) {
        index = Math.floor(Math.random() * tracks.length);
        attempts++;
      }

      recent.push(index);

      if (recent.length > Math.min(8, Math.floor(tracks.length / 2))) {
        recent.shift();
      }

      return index;
    }

    function showTrack() {
      if (!tracks.length) {
        status("Плейлист пустой.");
        return;
      }

      var track = tracks[currentIndex];

      player.src = track.file;
      player.load();

      now.innerHTML =
        '<div class="track-title">' + (track.title || "Без названия") + '</div>' +
        '<div class="artist">' + (track.artist || "Unknown Artist") + '</div>';

      licenseBox.textContent =
        (track.license || "Лицензия не указана") + " · " +
        (track.attribution || "Attribution не указана");

      status("Готово: " + track.file);
    }

    function loadRadio() {
      status("Загружаю playlist.json...");

      fetch("playlist.json?x=" + Date.now())
        .then(function(response) {
          if (!response.ok) {
            throw new Error("playlist.json не найден. Код: " + response.status);
          }
          return response.json();
        })
        .then(function(data) {
          tracks = data;

          if (!Array.isArray(tracks) || !tracks.length) {
            status("playlist.json загрузился, но он пустой.");
            return;
          }

          currentIndex = randomIndex();
          showTrack();

          status("Плейлист загружен. Треков: " + tracks.length + "\nТеперь нажми «Включить».");
        })
        .catch(function(error) {
          now.innerHTML =
            '<div class="track-title">Ошибка загрузки</div>' +
            '<div class="artist">Проверь playlist.json</div>';

          status("Ошибка: " + error.message);
        });
    }

    function playRadio() {
      if (!tracks.length) {
        loadRadio();
        setTimeout(function() {
          if (tracks.length) {
            playRadio();
          }
        }, 700);
        return;
      }

      player.play()
        .then(function() {
          document.body.classList.add("playing");
          status("Играет.");
        })
        .catch(function(error) {
          status("Браузер не дал включить звук.\nНажми Play на аудиоплеере.\n\n" + error.message);
        });
    }

    function nextTrack() {
      if (!tracks.length) {
        loadRadio();
        return;
      }

      currentIndex = randomIndex();
      showTrack();
      playRadio();
    }

    player.addEventListener("ended", nextTrack);

    player.addEventListener("pause", function() {
      document.body.classList.remove("playing");
    });

    player.addEventListener("play", function() {
      document.body.classList.add("playing");
    });

    loadRadio();
  </script>
</body>
</html>
